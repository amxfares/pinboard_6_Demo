<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinboard – Discover & Save Ideas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

<!-- scroll progress -->
<div class="scroll-line" id="scrollLine"></div>

<!-- NAV -->
<nav>
  <a class="logo" href="#">📌 Pinboard</a>

  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Search for ideas…">
  </div>

  <div class="nav-right">
    <button class="btn btn-ghost" onclick="showToast('Explore coming soon!')">Explore</button>
    <button class="btn btn-red" onclick="showToast('✨ Pin created!')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
      Create
    </button>
    <div class="avatar" title="My Profile">A</div>
  </div>
</nav>

<!-- TABS -->
<div class="tabs-bar" id="tabsBar">
  <button class="tab active" data-cat="all">All</button>
  <button class="tab" data-cat="nature">🌿 Nature</button>
  <button class="tab" data-cat="architecture">🏛️ Architecture</button>
  <button class="tab" data-cat="food">🍜 Food</button>
  <button class="tab" data-cat="fashion">👗 Fashion</button>
  <button class="tab" data-cat="travel">✈️ Travel</button>
  <button class="tab" data-cat="art">🎨 Art</button>
  <button class="tab" data-cat="interior">🛋️ Interior</button>
  <button class="tab" data-cat="tech">💻 Tech</button>
  <button class="tab" data-cat="wellness">🧘 Wellness</button>
</div>

<!-- MAIN -->
<main>
  <div class="masonry" id="grid"></div>
</main>

<!-- FAB -->
<button class="fab" title="Create Pin" onclick="showToast('✨ Pin creation coming soon!')">＋</button>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <img class="modal-img" id="modalImg" src="" alt="">
    <div class="modal-body">
      <div class="modal-title" id="modalTitle"></div>
      <p class="modal-desc" id="modalDesc"></p>
      <div class="modal-author">
        <img class="modal-author-avatar" id="modalAvatar" src="" alt="">
        <div>
          <div class="modal-author-name" id="modalAuthorName"></div>
          <div class="modal-author-sub" id="modalAuthorSub"></div>
        </div>
      </div>
      <button class="modal-save" id="modalSaveBtn" onclick="modalSave()">Save</button>
    </div>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="./assets/js/script.js"></script>
</body>
</html>
